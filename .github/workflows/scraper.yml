name: TankRadar Cloud Scraper
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          TANKRADAR_PLZ: '35444'
        run: python cloud_scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Zuerst pullen, um remote changes zu integrieren
          git fetch origin
          git pull --rebase origin main || true
          
          git add prices_history.csv
          
          if git diff --staged --quiet; then
            echo "Keine Änderungen – kein Commit nötig."
            exit 0
          fi
          
          git commit -m "Update fuel prices: $(date -u)"
          
          # Nochmal vor Push pullen für safety
          git pull --rebase origin main || true
          
          # Push mit retry logic
          git push || (git pull --rebase origin main && git push)
